<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sensor Harness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-2: #1a1a26;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-muted: #6a6a80;
    --accent: #22d67a;
    --accent-dim: rgba(34, 214, 122, 0.12);
    --error: #f45866;
    --error-dim: rgba(244, 88, 102, 0.12);
    --warn: #f4a838;
    --warn-dim: rgba(244, 168, 56, 0.12);
    --null-val: #5a5a70;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100dvh;
    padding: 0 0 80px 0;
    -webkit-font-smoothing: antialiased;
  }

  header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  header h1 {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--accent);
  }

  header p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .ua-bar {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    word-break: break-all;
    line-height: 1.5;
  }

  .controls {
    display: flex;
    gap: 10px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 69px;
    background: var(--bg);
    z-index: 9;
  }

  button {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    padding: 10px 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    flex: 1;
  }

  button:active { transform: scale(0.97); }

  button.primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  button.primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  button.copy-btn {
    font-size: 10px;
    padding: 4px 8px;
    flex: 0;
  }

  .section {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .section-title {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .badge.ok { background: var(--accent-dim); color: var(--accent); }
  .badge.err { background: var(--error-dim); color: var(--error); }
  .badge.warn { background: var(--warn-dim); color: var(--warn); }
  .badge.na { background: var(--surface-2); color: var(--text-muted); }

  .data-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .data-grid.two-col {
    grid-template-columns: 1fr 1fr;
  }

  .data-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
  }

  .data-cell .label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }

  .data-cell .value {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    word-break: break-all;
  }

  .data-cell .value.null { color: var(--null-val); }
  .data-cell .value.live { color: var(--accent); }

  .sub-section {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .sub-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .error-msg {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--error);
    padding: 8px 10px;
    background: var(--error-dim);
    border-radius: 6px;
    word-break: break-all;
  }

  .raw-output {
    margin-top: 16px;
    padding: 16px 20px;
  }

  .raw-output summary {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    padding: 8px 0;
  }

  .raw-output pre {
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.5;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    margin-top: 8px;
  }

  .timer {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    padding: 8px 20px;
    border-bottom: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <h1>// sensor_harness v2</h1>
  <p>Production-identical collectSensorData()</p>
</header>

<div class="ua-bar" id="uaBar"></div>

<div class="controls">
  <button class="primary" id="btnCollect" onclick="runCollect()">Collect Snapshot</button>
  <button class="copy-btn" onclick="copyRaw()">Copy</button>
</div>

<div id="timerBar" class="timer" style="display:none"></div>
<div id="sensorSections"></div>

<div class="raw-output">
  <details>
    <summary>Raw JSON — sensorData (as postBack would send it)</summary>
    <pre id="rawSensorData">Hit "Collect Snapshot" to begin.</pre>
  </details>
  <details style="margin-top:8px">
    <summary>Raw JSON — sensorErrors</summary>
    <pre id="rawSensorErrors">{}</pre>
  </details>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// PRODUCTION CODE — identical to template collectSensorData()
// This block should match your template 1:1
// ═══════════════════════════════════════════════════════════════

var sensorData = {};
sensorData['magnetometer'] = null;
sensorData['gravity'] = null;
sensorData['accelerometer'] = null;
sensorData['gyroscope'] = null;
sensorData['linearAcceleration'] = null;
sensorData['deviceMotion'] = null;
sensorData['deviceOrientation'] = null;

var sensorErrors = {};

function collectSensorData() {
  var SENSOR_TIMEOUT = 3000;
  var SENSOR_FREQ = 1;

  function tryGenericSensor(name, SensorClass) {
    try {
      var sensor = new SensorClass({ frequency: SENSOR_FREQ });
      var timeout = setTimeout(function() {
        sensor.stop();
        sensorErrors[name] = 'timeout';
      }, SENSOR_TIMEOUT);

      sensor.addEventListener('reading', function() {
        clearTimeout(timeout);
        sensorData[name] = JSON.stringify({
          'x': sensor['x'],
          'y': sensor['y'],
          'z': sensor['z'],
          'timestamp': sensor['timestamp']
        });
        sensor.stop();
      });
      sensor.addEventListener('error', function(e) {
        clearTimeout(timeout);
        sensorErrors[name] = e.error.name + ': ' + e.error.message;
      });
      sensor.start();
    } catch (e) {
      sensorErrors[name] = e.name + ': ' + e.message;
    }
  }

  // --- Generic Sensor APIs (Chromium) ---

  if (typeof Magnetometer !== 'undefined') {
    tryGenericSensor('magnetometer', Magnetometer);
  } else {
    sensorErrors['magnetometer'] = 'unsupported';
  }

  if (typeof GravitySensor !== 'undefined') {
    tryGenericSensor('gravity', GravitySensor);
  } else {
    sensorErrors['gravity'] = 'unsupported';
  }

  if (typeof Accelerometer !== 'undefined') {
    tryGenericSensor('accelerometer', Accelerometer);
  } else {
    sensorErrors['accelerometer'] = 'unsupported';
  }

  if (typeof Gyroscope !== 'undefined') {
    tryGenericSensor('gyroscope', Gyroscope);
  } else {
    sensorErrors['gyroscope'] = 'unsupported';
  }

  if (typeof LinearAccelerationSensor !== 'undefined') {
    tryGenericSensor('linearAcceleration', LinearAccelerationSensor);
  } else {
    sensorErrors['linearAcceleration'] = 'unsupported';
  }

  // --- Legacy fallbacks (Safari, Firefox, older Chrome) ---
  function handleMotion(event) {
    window.removeEventListener('devicemotion', handleMotion);
    var a = event['acceleration'] || {};
    var ag = event['accelerationIncludingGravity'] || {};
    var rr = event['rotationRate'] || {};
    sensorData['deviceMotion'] = JSON.stringify({
      'acceleration': { 'x': a['x'], 'y': a['y'], 'z': a['z'] },
      'accelerationIncludingGravity': { 'x': ag['x'], 'y': ag['y'], 'z': ag['z'] },
      'rotationRate': { 'alpha': rr['alpha'], 'beta': rr['beta'], 'gamma': rr['gamma'] },
      'interval': event['interval'],
      'timestamp': new Date().getTime()
    });
  }

  function handleOrientation(event) {
    window.removeEventListener('deviceorientation', handleOrientation);
    sensorData['deviceOrientation'] = JSON.stringify({
      'alpha': event['alpha'],
      'beta': event['beta'],
      'gamma': event['gamma'],
      'absolute': event['absolute'],
      'timestamp': new Date().getTime()
    });
  }

  // iOS 13+ requires permission request
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
    DeviceMotionEvent.requestPermission().then(function(state) {
      if (state === 'granted') {
        window.addEventListener('devicemotion', handleMotion);
      } else {
        sensorErrors['deviceMotion'] = 'denied';
      }
    }).catch(function(e) {
      sensorErrors['deviceMotion'] = e.name + ': ' + e.message;
    });
  } else if (typeof DeviceMotionEvent !== 'undefined') {
    window.addEventListener('devicemotion', handleMotion);
  } else {
    sensorErrors['deviceMotion'] = 'unsupported';
  }

  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(function(state) {
      if (state === 'granted') {
        window.addEventListener('deviceorientation', handleOrientation);
      } else {
        sensorErrors['deviceOrientation'] = 'denied';
      }
    }).catch(function(e) {
      sensorErrors['deviceOrientation'] = e.name + ': ' + e.message;
    });
  } else if (typeof DeviceOrientationEvent !== 'undefined') {
    window.addEventListener('deviceorientation', handleOrientation);
  } else {
    sensorErrors['deviceOrientation'] = 'unsupported';
  }

  // Cleanup legacy listeners after timeout
  setTimeout(function() {
    window.removeEventListener('devicemotion', handleMotion);
    window.removeEventListener('deviceorientation', handleOrientation);
    if (!sensorData['deviceMotion'] && !sensorErrors['deviceMotion']) {
      sensorErrors['deviceMotion'] = 'no_event';
    }
    if (!sensorData['deviceOrientation'] && !sensorErrors['deviceOrientation']) {
      sensorErrors['deviceOrientation'] = 'no_event';
    }
  }, SENSOR_TIMEOUT);
}

// ═══════════════════════════════════════════════════════════════
// HARNESS UI — display layer only, does not touch collection
// ═══════════════════════════════════════════════════════════════

document.getElementById('uaBar').textContent = navigator.userAgent;

function runCollect() {
  var btn = document.getElementById('btnCollect');
  btn.disabled = true;
  btn.textContent = 'Collecting\u2026';

  // Reset state exactly as production would
  sensorData = {};
  sensorData['magnetometer'] = null;
  sensorData['gravity'] = null;
  sensorData['accelerometer'] = null;
  sensorData['gyroscope'] = null;
  sensorData['linearAcceleration'] = null;
  sensorData['deviceMotion'] = null;
  sensorData['deviceOrientation'] = null;
  sensorErrors = {};

  var startTime = Date.now();
  collectSensorData();

  // Poll and re-render until timeout passes
  var pollInterval = setInterval(function() {
    var elapsed = Date.now() - startTime;
    document.getElementById('timerBar').style.display = 'block';
    document.getElementById('timerBar').textContent = 'Elapsed: ' + elapsed + 'ms / 3000ms';
    renderUI();

    if (elapsed >= 3500) {
      clearInterval(pollInterval);
      document.getElementById('timerBar').textContent = 'Collection complete \u2014 ' + elapsed + 'ms';
      btn.disabled = false;
      btn.textContent = 'Collect Snapshot';
      renderUI();
    }
  }, 250);
}

function renderUI() {
  var container = document.getElementById('sensorSections');
  var html = '';

  var genericNames = [
    ['magnetometer', 'Magnetometer', '\u03BCT'],
    ['gravity', 'GravitySensor', 'm/s\u00B2'],
    ['accelerometer', 'Accelerometer', 'm/s\u00B2'],
    ['gyroscope', 'Gyroscope', 'rad/s'],
    ['linearAcceleration', 'LinearAcceleration', 'm/s\u00B2'],
  ];

  for (var i = 0; i < genericNames.length; i++) {
    html += renderGenericSection(genericNames[i][0], genericNames[i][1], genericNames[i][2]);
  }

  html += renderDeviceMotionSection();
  html += renderDeviceOrientationSection();

  container.innerHTML = html;

  document.getElementById('rawSensorData').textContent = JSON.stringify(sensorData, null, 2);
  document.getElementById('rawSensorErrors').textContent = JSON.stringify(sensorErrors, null, 2);
}

function parseIfString(val) {
  if (typeof val === 'string') {
    try { return JSON.parse(val); } catch(e) { return null; }
  }
  return val;
}

function renderGenericSection(key, label, unit) {
  var raw = sensorData[key];
  var data = parseIfString(raw);
  var error = sensorErrors[key];
  var badge = getBadge(data, error);

  var body = '';
  if (data) {
    body =
      '<div class="data-grid">' +
        dataCell('X', fmtNum(data['x']), unit) +
        dataCell('Y', fmtNum(data['y']), unit) +
        dataCell('Z', fmtNum(data['z']), unit) +
      '</div>' +
      '<div class="data-grid two-col" style="margin-top:8px">' +
        dataCell('Timestamp', data['timestamp'] ? new Date(data['timestamp']).toISOString() : 'null', '') +
        dataCell('Magnitude', fmtNum(magnitude(data['x'], data['y'], data['z'])), unit) +
      '</div>' +
      '<div style="margin-top:8px"><div class="sub-label">Raw string (as sent to server)</div>' +
        '<div class="error-msg" style="color:var(--text-muted);background:var(--surface-2);font-size:10px">' + escHtml(String(raw)) + '</div>' +
      '</div>';
  } else if (error) {
    body = '<div class="error-msg">' + escHtml(error) + '</div>';
  } else {
    body = '<div class="error-msg" style="color:var(--text-muted);background:var(--surface-2)">Waiting\u2026</div>';
  }

  return '<div class="section">' +
    '<div class="section-header">' +
      '<span class="section-title">' + label + '</span>' +
      badge +
    '</div>' +
    body +
  '</div>';
}

function renderDeviceMotionSection() {
  var raw = sensorData['deviceMotion'];
  var data = parseIfString(raw);
  var error = sensorErrors['deviceMotion'];
  var badge = getBadge(data, error);

  var body = '';
  if (data) {
    var a = data['acceleration'] || {};
    var ag = data['accelerationIncludingGravity'] || {};
    var rr = data['rotationRate'] || {};

    body =
      '<div class="sub-label">Acceleration</div>' +
      '<div class="data-grid">' +
        dataCell('X', fmtNum(a['x']), 'm/s\u00B2') +
        dataCell('Y', fmtNum(a['y']), 'm/s\u00B2') +
        dataCell('Z', fmtNum(a['z']), 'm/s\u00B2') +
      '</div>' +
      '<div class="sub-section">' +
        '<div class="sub-label">Accel + Gravity</div>' +
        '<div class="data-grid">' +
          dataCell('X', fmtNum(ag['x']), 'm/s\u00B2') +
          dataCell('Y', fmtNum(ag['y']), 'm/s\u00B2') +
          dataCell('Z', fmtNum(ag['z']), 'm/s\u00B2') +
        '</div>' +
      '</div>' +
      '<div class="sub-section">' +
        '<div class="sub-label">Rotation Rate</div>' +
        '<div class="data-grid">' +
          dataCell('\u03B1', fmtNum(rr['alpha']), '\u00B0/s') +
          dataCell('\u03B2', fmtNum(rr['beta']), '\u00B0/s') +
          dataCell('\u03B3', fmtNum(rr['gamma']), '\u00B0/s') +
        '</div>' +
      '</div>' +
      '<div class="data-grid two-col" style="margin-top:8px">' +
        dataCell('Interval', data['interval'] + 'ms', '') +
        dataCell('Timestamp', new Date(data['timestamp']).toISOString(), '') +
      '</div>' +
      '<div style="margin-top:8px"><div class="sub-label">Raw string (as sent to server)</div>' +
        '<div class="error-msg" style="color:var(--text-muted);background:var(--surface-2);font-size:10px">' + escHtml(String(raw)) + '</div>' +
      '</div>';
  } else if (error) {
    body = '<div class="error-msg">' + escHtml(error) + '</div>';
  } else {
    body = '<div class="error-msg" style="color:var(--text-muted);background:var(--surface-2)">Waiting\u2026</div>';
  }

  return '<div class="section">' +
    '<div class="section-header">' +
      '<span class="section-title">DeviceMotion (legacy)</span>' +
      badge +
    '</div>' +
    body +
  '</div>';
}

function renderDeviceOrientationSection() {
  var raw = sensorData['deviceOrientation'];
  var data = parseIfString(raw);
  var error = sensorErrors['deviceOrientation'];
  var badge = getBadge(data, error);

  var body = '';
  if (data) {
    body =
      '<div class="data-grid">' +
        dataCell('\u03B1 compass', fmtNum(data['alpha']), '\u00B0') +
        dataCell('\u03B2 tilt fb', fmtNum(data['beta']), '\u00B0') +
        dataCell('\u03B3 tilt lr', fmtNum(data['gamma']), '\u00B0') +
      '</div>' +
      '<div class="data-grid two-col" style="margin-top:8px">' +
        dataCell('Absolute', String(data['absolute']), '') +
        dataCell('Timestamp', new Date(data['timestamp']).toISOString(), '') +
      '</div>' +
      '<div style="margin-top:8px"><div class="sub-label">Raw string (as sent to server)</div>' +
        '<div class="error-msg" style="color:var(--text-muted);background:var(--surface-2);font-size:10px">' + escHtml(String(raw)) + '</div>' +
      '</div>';
  } else if (error) {
    body = '<div class="error-msg">' + escHtml(error) + '</div>';
  } else {
    body = '<div class="error-msg" style="color:var(--text-muted);background:var(--surface-2)">Waiting\u2026</div>';
  }

  return '<div class="section">' +
    '<div class="section-header">' +
      '<span class="section-title">DeviceOrientation (legacy)</span>' +
      badge +
    '</div>' +
    body +
  '</div>';
}

function getBadge(data, error) {
  if (data) {
    var hasReal = JSON.stringify(data).match(/:\s*-?\d+\.?\d*/);
    if (hasReal) return '<span class="badge ok">Live</span>';
    return '<span class="badge warn">Null vals</span>';
  }
  if (error === 'unsupported') return '<span class="badge na">N/A</span>';
  if (error) return '<span class="badge err">Error</span>';
  return '<span class="badge na">\u2014</span>';
}

function dataCell(label, value, unit) {
  var isNull = value === 'null' || value === null || value === undefined;
  var cls = isNull ? 'null' : 'live';
  var display = isNull ? '\u2014' : value + (unit ? ' <span style="opacity:0.5;font-size:10px">' + unit + '</span>' : '');
  return '<div class="data-cell">' +
    '<div class="label">' + label + '</div>' +
    '<div class="value ' + cls + '">' + display + '</div>' +
  '</div>';
}

function fmtNum(n) {
  if (n === null || n === undefined) return 'null';
  return Number(n).toFixed(4);
}

function magnitude(x, y, z) {
  if (x === null || y === null || z === null) return null;
  return Math.sqrt(x * x + y * y + z * z);
}

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function copyRaw() {
  var payload = {
    sensorData: sensorData,
    sensorErrors: sensorErrors,
    userAgent: navigator.userAgent,
    timestamp: new Date().toISOString()
  };
  navigator.clipboard.writeText(JSON.stringify(payload, null, 2)).then(function() {
    var btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
  });
}
</script>
</body>
</html>
